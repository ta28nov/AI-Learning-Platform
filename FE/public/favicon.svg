<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .text-lms {
        font-family: 'Fraunces', 'Times New Roman', Georgia, serif;
        font-size: 23px;
        font-weight: 900;
        fill: #16130E; /* Dark ink for light mode */
      }
      .text-ai {
        font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
        font-size: 18px;
        font-weight: 900;
        fill: #C7332B; /* Vermilion for light mode */
        letter-spacing: 0.08em;
      }
      @media (prefers-color-scheme: dark) {
        .text-lms {
          fill: #F5EFE6; /* Light cream for dark mode */
        }
        .text-ai {
          fill: #E2C36F; /* Gold for dark mode */
        }
      }
    </style>
  </defs>
  <!-- Typography layout for LMS AI logo (Doubled Size) -->
  <text x="33" y="28" text-anchor="middle" class="text-lms">LMS</text>
  <text x="33" y="52" text-anchor="middle" class="text-ai">AI</text>
</svg>
